<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %} — {{ site_name }}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          borderRadius: { sm: '3px', DEFAULT: '3px', md: '4px', lg: '6px' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<!-- ================================================================
     ADMIN HEADER
     ================================================================ -->
<header class="bg-white border-b border-slate-200 h-12 flex items-center px-4 gap-4 sticky top-0 z-40">

  <!-- Logo -->
  <a href="/" class="flex items-center gap-1.5 text-slate-500 hover:text-blue-600 transition-colors shrink-0">
    <i data-lucide="download-cloud" class="w-4 h-4 text-blue-500"></i>
    <span class="text-sm font-medium hidden sm:inline">{{ site_name }}</span>
  </a>

  <div class="w-px h-5 bg-slate-200 shrink-0"></div>

  <span class="text-sm font-semibold text-slate-700">Admin Paneli</span>

  <div class="flex-1"></div>

  <!-- Admin kullanıcı -->
  {% if admin_user is defined %}
  <div class="flex items-center gap-1.5 text-xs text-slate-400">
    <i data-lucide="user-circle" class="w-3.5 h-3.5"></i>
    <span>{{ admin_user }}</span>
  </div>
  {% endif %}

  <!-- Siteye dön -->
  <a href="/" target="_blank"
    class="hidden sm:inline-flex items-center gap-1 text-xs text-slate-500 hover:text-blue-600
           px-2.5 py-1.5 border border-slate-200 rounded-sm hover:border-blue-200 transition-colors">
    <i data-lucide="external-link" class="w-3 h-3"></i>
    Siteye Git
  </a>

  <!-- Çıkış -->
  <a href="/admin/logout"
    class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-red-600
           px-2.5 py-1.5 border border-slate-200 rounded-sm hover:border-red-200 transition-colors">
    <i data-lucide="log-out" class="w-3 h-3"></i>
    Çıkış
  </a>
</header>

<!-- ================================================================
     MAIN LAYOUT
     ================================================================ -->
<div class="flex min-h-[calc(100vh-3rem)]">

  <!-- ── Sol Sidebar Nav ──────────────────────────────── -->
  <aside class="w-44 shrink-0 bg-white border-r border-slate-200 py-4 px-2 hidden sm:block">
    <nav class="space-y-0.5">

      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-2 mb-2">Menü</p>

      <a href="/admin"
        class="flex items-center gap-2 px-2.5 py-2 text-sm rounded-sm transition-colors
        {% if request.url.path in ['/admin', '/admin/'] %}
          bg-blue-50 text-blue-700 font-medium
        {% else %}
          text-slate-600 hover:bg-slate-100
        {% endif %}">
        <i data-lucide="layout-dashboard" class="w-3.5 h-3.5 shrink-0"></i>
        Dashboard
      </a>

      <a href="/admin/downloads/new"
        class="flex items-center gap-2 px-2.5 py-2 text-sm rounded-sm transition-colors
        {% if request.url.path == '/admin/downloads/new' %}
          bg-blue-50 text-blue-700 font-medium
        {% else %}
          text-slate-600 hover:bg-slate-100
        {% endif %}">
        <i data-lucide="plus-circle" class="w-3.5 h-3.5 shrink-0"></i>
        Yeni Dosya
      </a>

      <div class="pt-3 pb-1">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-2 mb-1">Yönetim</p>
      </div>

      <a href="/admin/categories"
        class="flex items-center gap-2 px-2.5 py-2 text-sm rounded-sm transition-colors
        {% if '/admin/categories' in request.url.path %}
          bg-blue-50 text-blue-700 font-medium
        {% else %}
          text-slate-600 hover:bg-slate-100
        {% endif %}">
        <i data-lucide="folder" class="w-3.5 h-3.5 shrink-0"></i>
        Kategoriler
      </a>

      <a href="/admin/tags"
        class="flex items-center gap-2 px-2.5 py-2 text-sm rounded-sm transition-colors
        {% if '/admin/tags' in request.url.path %}
          bg-blue-50 text-blue-700 font-medium
        {% else %}
          text-slate-600 hover:bg-slate-100
        {% endif %}">
        <i data-lucide="tag" class="w-3.5 h-3.5 shrink-0"></i>
        Etiketler
      </a>
    </nav>
  </aside>

  <!-- ── Ana İçerik ──────────────────────────────────── -->
  <main class="flex-1 min-w-0 p-6">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- Scripts -->
<script>
  lucide.createIcons();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
